<p class="font-body text-on-surface-variant text-md leading-relaxed">
                Enter 6-digit OTP sent to <span class="font-bold text-on-surface">+91 XXXXXXX890</span>
</p>
</section>
<!-- Verification Area -->
<div class="bg-surface-container-low rounded-3xl p-8 shadow-sm">
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-3 mb-10">
<input class="otp-input w-full h-14 bg-surface-container-lowest text-center text-xl font-bold rounded-xl border-none focus:ring-2 focus:ring-primary text-primary" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full h-14 bg-surface-container-lowest text-center text-xl font-bold rounded-xl border-none focus:ring-2 focus:ring-primary text-primary" maxlength="1" placeholder="•" type="text"/>

<input class="otp-input w-full h-14 bg-surface-container-lowest text-center text-xl font-bold rounded-xl border-none focus:ring-2 focus:ring-primary text-primary" maxlength="1" placeholder="•" type="text"/>

<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg active:scale-95 transition-all duration-200 mb-6 flex items-center justify-center gap-2">

<span class="material-symbols-outlined text-sm" data-icon="check_circle">check_circle</span>

<button class="group flex items-center gap-2 font-label text-sm text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="refresh">refresh</span>
<span>Resend OTP <span class="font-bold text-primary">(30s timer)</span></span>
</button>
<div class="w-8 h-px bg-outline-variant/30"></div>
<button class="group flex items-center gap-2 font-label text-sm text-on-secondary-fixed-variant hover:underline decoration-2 underline-offset-4 transition-all">
