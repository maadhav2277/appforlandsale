<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#092012",
                    "on-tertiary-container": "#93ad98",
                    "on-secondary-container": "#1b724f",
                    "on-secondary": "#ffffff",
                    "outline": "#717973",
                    "on-primary-container": "#76b394",
                    "outline-variant": "#c1c8c2",
                    "on-primary-fixed-variant": "#0e5138",
                    "on-secondary-fixed-variant": "#005236",
                    "inverse-on-surface": "#dff4ff",
                    "error": "#ba1a1a",
                    "tertiary-container": "#2a4131",
                    "surface-bright": "#f3faff",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "secondary": "#116c4a",
                    "surface-tint": "#2c694e",
                    "surface-container-low": "#e6f6ff",
                    "tertiary-fixed-dim": "#b3cdb7",
                    "secondary-fixed-dim": "#86d7ad",
                    "tertiary": "#152b1c",
                    "inverse-primary": "#95d4b3",
                    "surface-container": "#d8f2ff",
                    "primary-fixed-dim": "#95d4b3",
                    "on-primary": "#ffffff",
                    "surface": "#f3faff",
                    "secondary-fixed": "#a1f4c8",
                    "primary-container": "#00452e",
                    "surface-variant": "#c6e8f8",
                    "on-tertiary-fixed-variant": "#354c3b",
                    "surface-container-high": "#ccedfe",
                    "primary": "#002d1c",
                    "on-surface-variant": "#414844",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#cee9d3",
                    "on-primary-fixed": "#002114",
                    "on-secondary-fixed": "#002113",
                    "primary-fixed": "#b1f0ce",
                    "on-surface": "#001f29",
                    "surface-dim": "#bedfef",
                    "surface-container-highest": "#c6e8f8",
                    "background": "#f3faff",
                    "inverse-surface": "#123441",
                    "secondary-container": "#a1f4c8",
                    "on-background": "#001f29"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .horizon-gradient {
            background: linear-gradient(135deg, #002d1c 0%, #00452e 100%);
        }
        .glass-panel {
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f3faff]/70 dark:bg-[#001f29]/70 backdrop-blur-xl">
<div class="flex items-center px-6 h-16 w-full max-w-xl mx-auto">
<button class="mr-4 text-[#1B4332] dark:text-[#a1f4c8] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-lg text-[#1B4332] dark:text-[#a1f4c8]">Security Settings</h1>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md">
<!-- Hero Illustration Section (Bento Inspired Layout) -->
<div class="relative mb-12">
<div class="aspect-square w-full max-w-[280px] mx-auto relative overflow-hidden rounded-full p-1 bg-surface-container-low">
<div class="w-full h-full rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-sm">
<img class="w-full h-full object-cover grayscale opacity-90 contrast-125" data-alt="Modern abstract overhead view of a serene misty landscape with soft green pine trees and atmospheric depth" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyjUAUXJEBGqPcKYFPHrjwh0ZlpBDb0ZOIHofsDZ9UJmPSEOkVqHlN8t6dRwllvWf15h9yzaUXJQdqK7hnkyY6wsZ0VeLpjczEL_D4v2dPntJSvWf1gikEkskBZ-wHHdyuo97RdkaTJZ7Nl2iW2zZtqe1lGMsWd0PkH4iaoZKTah9ykFEsRB5OrU1se_Imaj-29-bTWcYDsHLDIUNKb0ltp8CC5eO5jTF5WyBFfiraswXd7Kde3zrQILuVkQiWY-cE7St3M1kHNIuE"/>
</div>
<!-- Floating Badge -->
<div class="absolute bottom-4 right-4 bg-secondary-container text-on-secondary-container p-3 rounded-full shadow-lg border-2 border-surface-container-lowest">
<span class="material-symbols-outlined block" style="font-variation-settings: 'FILL' 1;">mail</span>
</div>
</div>
</div>
<!-- Content Canvas -->
<div class="text-center space-y-4 mb-10">
<h2 class="text-3xl font-headline font-extrabold text-primary tracking-tight">Verify Your Email</h2>
<div class="bg-surface-container-low py-4 px-6 rounded-xl inline-block">
<p class="text-on-surface-variant font-label text-sm">
                        We sent a verification link to <span class="font-bold text-on-surface">newmail@example.com</span>
</p>
</div>
<p class="text-on-surface-variant text-sm max-w-[280px] mx-auto leading-relaxed">
                    Please check your inbox and click the link to confirm your new email address.
                </p>
</div>
<!-- Action Cluster -->
<div class="space-y-4">
<!-- Primary Action -->
<button class="horizon-gradient w-full py-4 px-8 rounded-xl text-on-primary font-headline font-bold text-lg shadow-xl shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined">open_in_new</span>
                    Open Mail App
                </button>
<!-- Secondary Grid -->
<div class="grid grid-cols-2 gap-4 pt-2">
<button class="flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl border border-outline-variant/15 text-on-secondary-container font-label font-semibold text-sm hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px]">refresh</span>
                        Resend Link
                    </button>
<button class="flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl border border-outline-variant/15 text-on-secondary-container font-label font-semibold text-sm hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px]">edit</span>
                        Change Email
                    </button>
</div>
</div>
<!-- Step Progress Indicator -->
<div class="mt-12 flex justify-center items-center gap-3">
<div class="h-1.5 w-8 rounded-full bg-secondary-fixed"></div>
<div class="h-1.5 w-8 rounded-full bg-secondary-fixed"></div>
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed as per focused task instructions, but structure maintained for shell integrity if needed) -->
<!-- The user is in a "focused journey" (Step 3 of a flow), so the nav is visually omitted to prioritize the Canvas -->
<footer class="py-8 text-center">
<p class="text-on-surface-variant/40 font-label text-[11px] tracking-widest uppercase">The Digital Surveyor • Security Infrastructure</p>
</footer>
</body></html>
