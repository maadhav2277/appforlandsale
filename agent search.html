<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#d8f2ff",
                    "error": "#ba1a1a",
                    "surface-tint": "#2c694e",
                    "on-secondary-fixed-variant": "#005236",
                    "secondary-container": "#a1f4c8",
                    "on-primary-container": "#76b394",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#b3cdb7",
                    "surface-container-low": "#e6f6ff",
                    "on-tertiary": "#ffffff",
                    "tertiary": "#152b1c",
                    "on-primary-fixed-variant": "#0e5138",
                    "primary": "#002d1c",
                    "on-primary-fixed": "#002114",
                    "secondary-fixed-dim": "#86d7ad",
                    "primary-fixed-dim": "#95d4b3",
                    "primary-fixed": "#b1f0ce",
                    "on-tertiary-fixed": "#092012",
                    "secondary-fixed": "#a1f4c8",
                    "inverse-on-surface": "#dff4ff",
                    "on-surface": "#001f29",
                    "surface": "#f3faff",
                    "background": "#f3faff",
                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#ccedfe",
                    "outline-variant": "#c1c8c2",
                    "on-secondary-fixed": "#002113",
                    "surface-bright": "#f3faff",
                    "surface-dim": "#bedfef",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#95d4b3",
                    "on-surface-variant": "#414844",
                    "tertiary-fixed": "#cee9d3",
                    "tertiary-container": "#2a4131",
                    "primary-container": "#00452e",
                    "on-secondary-container": "#1b724f",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "outline": "#717973",
                    "surface-container-highest": "#c6e8f8",
                    "on-tertiary-container": "#93ad98",
                    "surface-variant": "#c6e8f8",
                    "secondary": "#116c4a",
                    "on-tertiary-fixed-variant": "#354c3b",
                    "on-background": "#001f29",
                    "inverse-surface": "#123441"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-bg {
            background-color: var(--tw-bg-opacity);
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed overflow-hidden">
<!-- TopAppBar from Shared Components -->
<header class="sticky top-0 w-full z-50 px-6 py-4 flex items-center justify-between bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-sm rounded-none">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-emerald-900 dark:text-emerald-50 cursor-pointer p-2 hover:bg-emerald-50/50 dark:hover:bg-emerald-900/20 transition-colors rounded-full" data-icon="search">search</span>
<h1 class="font-manrope tracking-tight font-extrabold text-2xl text-emerald-900 dark:text-emerald-50">The Topographic Editorial</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-900 dark:text-emerald-50 cursor-pointer p-2 hover:bg-emerald-50/50 dark:hover:bg-emerald-900/20 transition-colors rounded-full" data-icon="tune">tune</span>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative h-[calc(100vh-80px-80px)] w-full overflow-hidden">
<!-- Map Background -->
<div class="absolute inset-0 z-0">
<img alt="High-resolution topographic map of a scenic rural landscape with lush valleys and winding rivers" class="w-full h-full object-cover grayscale-[20%] sepia-[10%] opacity-90" data-alt="Minimalist topographic map style view of a lush mountain valley with soft greens and detailed elevation contours in natural light" data-location="Northern Highlands" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCmWyzwF2MKcm2v7Sd-zHGs-pn3-s1_32OeTr_Vt4QoVvw0i9Gs19TK4mUgH8WqIUzGshI4ucvYW25wDix_RZt4oR_edDQLaPNH0fERlzAoAniA-pyPaGAfRCa3eAXp97gAmijRLq72Wo04B2XvJDSKMtJ4VMYDOIS7szwoMLXorZlxjeaGg_FAVDIPULdeH2MRxBAcwZm3mtBOQBHrAJHqy3J_ttE5bi_Csn-zRmA69bDx60w--jNb2En7UU27uWeOQtow4capBGk"/>
<!-- Map Overlay Gradients -->
<div class="absolute inset-0 bg-gradient-to-b from-surface/20 to-transparent pointer-events-none"></div>
</div>
<!-- Filter Bar -->
<div class="absolute top-6 left-1/2 -translate-x-1/2 z-20 w-full max-w-2xl px-6">
<div class="bg-surface-container-lowest/90 backdrop-blur-md rounded-full shadow-[0_20_40px_rgba(0,31,41,0.06)] p-2 flex items-center gap-2 overflow-x-auto no-scrollbar">
<button class="px-5 py-2.5 rounded-full font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant hover:bg-surface-container-low transition-colors whitespace-nowrap">Commercial</button>
<button class="px-5 py-2.5 rounded-full font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant hover:bg-surface-container-low transition-colors whitespace-nowrap">Agriculture</button>
<button class="px-5 py-2.5 rounded-full font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant hover:bg-surface-container-low transition-colors whitespace-nowrap">Plots</button>
<button class="px-6 py-2.5 rounded-full font-label text-xs font-semibold uppercase tracking-widest bg-primary text-on-primary shadow-sm whitespace-nowrap flex items-center gap-2">
                    Agents
                    <span class="w-1.5 h-1.5 rounded-full bg-secondary-container"></span>
</button>
</div>
</div>
<!-- Map Markers (Agents) -->
<div class="absolute inset-0 pointer-events-none">
<!-- Marker 1: Inactive -->
<div class="absolute top-[35%] left-[42%] pointer-events-auto cursor-pointer group">
<div class="w-10 h-10 bg-primary border-[3px] border-on-primary rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110">
<span class="material-symbols-outlined text-on-primary text-sm" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</div>
<!-- Marker 2: Inactive -->
<div class="absolute top-[55%] left-[65%] pointer-events-auto cursor-pointer group">
<div class="w-10 h-10 bg-primary border-[3px] border-on-primary rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110">
<span class="material-symbols-outlined text-on-primary text-sm" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</div>
<!-- Marker 3: ACTIVE -->
<div class="absolute top-[48%] left-[25%] pointer-events-auto cursor-pointer group">
<!-- Glowing Halo -->
<div class="absolute inset-0 w-12 h-12 -m-1 bg-secondary-container/40 rounded-full animate-pulse scale-125"></div>
<div class="relative w-12 h-12 bg-primary border-[3px] border-on-primary rounded-full flex items-center justify-center shadow-2xl transition-transform scale-110">
<span class="material-symbols-outlined text-on-primary text-base" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</div>
</div>
<!-- Selected Agent Preview Card -->
<div class="absolute bottom-10 left-6 right-6 md:left-1/2 md:-translate-x-1/2 md:max-w-md z-30">
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_20px_40px_rgba(0,31,41,0.06)] p-5 flex items-center gap-5">
<div class="w-20 h-20 rounded-full overflow-hidden flex-shrink-0">
<img alt="Portrait of professional real estate agent Alistair Thorne" class="w-full h-full object-cover" data-alt="Professional portrait of a mature man with a friendly expression, soft studio lighting on a neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLCijI56K4hUpOD92fehfUf3qYKBXfTS959ZtC3vDtAiauf_yqScWjfb28zS6OD214ByyG5v0pdw7g4EI0Dsmy3fOvjVUXx4e1ni06P5pnuFVhWGuS4otBmO_s_SILkHECOICTGS3CXj3Nfe23N-DNAn6U_84kE3LEue0rLQHgNlJbJ1gyosAOR6o9ip9Mb2cp304ODhE-H5WGVmUdOW9wZD2sXr3ikS12kS0hnbKWvdreq2XEIfaPZXA0YVtH_A87l6qX_ibsBJq3"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<div>
<h3 class="font-headline font-bold text-lg text-primary leading-tight">Alistair Thorne</h3>
<p class="font-label text-xs text-on-secondary-container font-semibold uppercase tracking-wider mt-0.5">Heritage Estates Specialist</p>
</div>
<div class="flex items-center gap-1 bg-secondary-container/30 px-2 py-1 rounded-md">
<span class="material-symbols-outlined text-secondary text-[14px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label text-xs font-bold text-secondary">4.9</span>
</div>
</div>
<div class="mt-4 flex items-center justify-between">
<div class="flex -space-x-2">
<div class="w-7 h-7 rounded-full bg-surface-container-low border-2 border-surface-container-lowest flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-primary">landscape</span>
</div>
<div class="w-7 h-7 rounded-full bg-surface-container-low border-2 border-surface-container-lowest flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-primary">history</span>
</div>
</div>
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-5 py-2 rounded-full font-label text-[11px] font-bold uppercase tracking-widest shadow-sm hover:opacity-90 transition-opacity">VIEW PROFILE</button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar from Shared Components -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-3 pb-safe bg-white/80 dark:bg-slate-900/80 backdrop-blur-2xl shadow-[0_-10px_30px_rgba(0,31,41,0.05)] rounded-t-[24px]">
<!-- Explore - ACTIVE -->
<a class="flex flex-col items-center justify-center text-emerald-900 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/40 rounded-xl px-4 py-1 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-widest mt-1">Explore</span>
</a>
<!-- Saved -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-700 dark:hover:text-emerald-300 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-widest mt-1">Saved</span>
</a>
<!-- Inquiries -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-700 dark:hover:text-emerald-300 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="forum">forum</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-widest mt-1">Inquiries</span>
</a>
<!-- Sell -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-700 dark:hover:text-emerald-300 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="add_location">add_location</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-widest mt-1">Sell</span>
</a>
</nav>
</body></html>
