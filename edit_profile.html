<!DOCTYPE html>

<html class="light" lang="en"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Profile - Terra Nova</title>

                        "on-secondary-fixed-variant": "#005236",
                        "secondary-fixed-dim": "#86d7ad",
                        "surface": "#f3faff",
                        "on-tertiary-container": "#93ad98",
                        "inverse-primary": "#95d4b3",
                        "tertiary-fixed-dim": "#b3cdb7",
                        "surface-tint": "#2c694e",
                        "primary-container": "#00452e",
                        "primary": "#002d1c",
                        "surface-bright": "#f3faff",
                        "on-primary-fixed-variant": "#0e5138",
                        "surface-container-high": "#ccedfe",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#dff4ff",
                        "tertiary": "#152b1c",
                        "outline": "#717973",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#a1f4c8",
                        "error": "#ba1a1a",

                        "on-tertiary-fixed": "#092012",
                        "on-secondary-fixed": "#002113",
                        "surface-container-highest": "#c6e8f8",

                        "surface-dim": "#bedfef",
                        "background": "#f3faff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#2a4131",
                        "surface-container-low": "#e6f6ff",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#414844",

                        "DEFAULT": "0.125rem",

                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Inter"]
                    }
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-[#f3faff]/70 dark:bg-[#001f29]/70 backdrop-blur-md">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#002d1c] dark:text-[#a1f4c8]">arrow_back</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-lg text-[#002d1c] dark:text-[#a1f4c8]">Edit Profile</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#002d1c] dark:text-[#a1f4c8]">more_vert</span>
</button>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 py-8">
<!-- Section 1: Basic Info -->
<section class="space-y-8">
<div class="flex flex-col items-center gap-4 mb-10">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-2xl">
<img alt="Profile Photo" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional man in outdoor setting with soft natural sunlight and forest background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJRp9mxoFuhFlyy2MkCrVGvHhPCNpRjheFh0q5NLkAbdMsT8Psc1ME72zjUjYF-nqMla1WgSK9EL3MqU97yiW55pHzJnyi7tDBEDQsKqjVGJb_64hzeBJhSHyfSpAdr18GEVR5hcWf89iUJ8vNw0mq_gi4RTGsPTMqSN-oHWKtYyYdfOrL-gyCuoywl9-AttpZJrU8wV-8YYsTccLTPh5WmcDJXJarUOPxceT1_JAf5QCfYRk2LkqYizMrF-3edpkBt43egsT4T70t"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary p-2 rounded-full shadow-lg hover:opacity-90 transition-all active:scale-90">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<div class="text-center">
<p class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">Profile Photo</p>
<button class="text-on-primary-fixed-variant text-sm font-bold mt-1 hover:underline">Change Photo</button>
</div>
</div>
<div class="bg-surface-container-low rounded-full p-8 space-y-6">
<h2 class="font-headline font-extrabold text-primary text-xl tracking-tight">Basic Info</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">Full Name</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container font-medium shadow-sm transition-all" type="text" value="Alex Sterling"/>
</div>
<!-- Username -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">Username (Optional)</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container font-medium shadow-sm transition-all" type="text" value="asterling_land"/>
</div>
<!-- Bio -->
<div class="md:col-span-2 space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">Bio (Optional)</label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container font-medium shadow-sm transition-all resize-none" rows="3">Passionate about sustainable land development and forest conservation investments in the Pacific Northwest.</textarea>
</div>
<!-- Location Grid -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">City</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container font-medium shadow-sm transition-all" type="text" value="Portland"/>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">State</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container font-medium shadow-sm transition-all" type="text" value="Oregon"/>
</div>
<div class="md:col-span-2 space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">Country</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container font-medium shadow-sm transition-all" type="text" value="United States"/>
</div>
</div>
</div>
</section>
<!-- Section 2: Contact Info -->
<section class="mt-8">
<div class="bg-surface-container-low rounded-full p-8 space-y-8">
<h2 class="font-headline font-extrabold text-primary text-xl tracking-tight">Contact Info</h2>
<div class="space-y-8">
<!-- Mobile -->
<div class="space-y-3">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">Mobile Number</label>
<div class="flex items-center gap-3">
<input class="flex-grow bg-surface-container-lowest/50 border-none rounded-xl px-4 py-3 text-on-surface-variant font-medium cursor-not-allowed" readonly="" type="text" value="+91 XXXXXXX234"/>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div class="pl-1">
<button class="bg-primary text-on-primary px-6 py-2.5 rounded-full shadow-md hover:shadow-lg transition-all active:scale-95 block w-fit text-sm font-bold tracking-wide hover:opacity-90">Change Mobile Number</button>
<p class="font-label text-[10px] text-on-surface-variant/70 mt-1 uppercase tracking-wide">Verification via OTP required for changes</p>
</div>
</div>
<!-- Email -->
<div class="space-y-3">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1">Email Address</label>
<div class="flex items-center gap-3">
<input class="flex-grow bg-surface-container-lowest/50 border-none rounded-xl px-4 py-3 text-on-surface-variant font-medium cursor-not-allowed" readonly="" type="email" value="alex.s@example.com"/>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div class="pl-1">
<button class="bg-primary text-on-primary px-6 py-2.5 rounded-full shadow-md hover:shadow-lg transition-all active:scale-95 block w-fit text-sm font-bold tracking-wide hover:opacity-90">Change Email</button>
<p class="font-label text-[10px] text-on-surface-variant/70 mt-1 uppercase tracking-wide">Email verification link will be sent</p>
</div>
</div>
</div>
</div>
</section>
<!-- Primary Action -->
<div class="mt-12">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-full shadow-xl hover:shadow-2xl transition-all active:scale-95 duration-200 text-lg tracking-tight">
                Update Profile
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-6 bg-[#f3faff]/80 dark:bg-[#001f29]/80 backdrop-blur-2xl rounded-t-[0.75rem] z-50 shadow-[0_-10px_30px_rgba(0,31,41,0.04)]">
<a class="flex flex-col items-center justify-center text-[#001f29]/50 dark:text-[#f3faff]/50 px-5 py-2 hover:text-[#002d1c] transition-colors" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-[#001f29]/50 dark:text-[#f3faff]/50 px-5 py-2 hover:text-[#002d1c] transition-colors" href="#">
<span class="material-symbols-outlined">terrain</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">Saved</span>
</a>
<a class="flex flex-col items-center justify-center text-[#001f29]/50 dark:text-[#f3faff]/50 px-5 py-2 hover:text-[#002d1c] transition-colors" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">Investments</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#a1f4c8] dark:bg-[#00452e] text-[#002d1c] dark:text-white rounded-[0.75rem] px-5 py-2" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">Profile</span>
</a>
</nav>
</body></html>
