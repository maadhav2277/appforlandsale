<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="bg-white/70 backdrop-blur-md dark:bg-slate-950/70 docked full-width top-0 sticky z-50 shadow-[0px_20px_40px_rgba(0,31,41,0.06)]">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:opacity-80 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-[#002d1c] dark:text-[#a1f4c8]">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold tracking-tight text-lg text-[#002d1c] dark:text-[#a1f4c8]">Edit Property</h1>
</div>
<button class="font-['Manrope'] font-bold tracking-tight text-lg text-[#002d1c] dark:text-[#a1f4c8] hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors px-4 py-1 rounded-xl">Save</button>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="max-w-3xl mx-auto px-6 pt-8 pb-32 space-y-4">
<!-- Hero Property Preview -->
<section class="mb-8">
<div class="relative h-48 w-full rounded-full overflow-hidden mb-4">
<img class="w-full h-full object-cover" data-alt="wide angle shot of rolling green hills at dawn with soft atmospheric mist and a single ancient oak tree" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQ4vujbrQXHXUocuSEbg8kZvTEIoQURyFM8WgYF5sYfdoYCTncfO-51eJDvO6OgQ3P9ddwzE3a1vhhFYvMXL3PolfDCrhAlEd0UxUL_U-myIDkEt_iYuI3_TUUaJRsyK6F1IPdBNaNRUpBvkKq8WOWOv6b8ubRDgu6G5C9GNUz08SN7KKawyi5DGv7pzLrnHue9R-ApE1nwlnDIx9mrStSJS52POfIyxKTe_DX71uBJQEz_OqoJ4MnWsm6CP3kNQ1SPjHxd0pKCwzZ"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
<div class="absolute bottom-4 left-6 text-white">
<p class="font-label text-[11px] uppercase tracking-widest opacity-80">Draft Listing</p>
<h2 class="text-2xl font-bold font-headline">Wildflower Ridge Estate</h2>
</div>
</div>
</section>
<!-- Accordion Sections -->
<div class="space-y-4">
<!-- Location Details -->
<div class="bg-surface-container-lowest rounded-full overflow-hidden shadow-[0px_20px_40px_rgba(0,31,41,0.06)] group">
<button class="w-full flex items-center justify-between p-6 text-left hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined">location_on</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">Location Details</h3>
<p class="text-on-surface-variant text-sm font-label">Coordinates, address, and vicinity</p>
</div>
</div>
<span class="material-symbols-outlined text-outline transition-transform group-hover:translate-x-1">chevron_right</span>
</button>
</div>
<!-- Land Characteristics -->
<div class="bg-surface-container-lowest rounded-full overflow-hidden shadow-[0px_20px_40px_rgba(0,31,41,0.06)] group">
<button class="w-full flex items-center justify-between p-6 text-left hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined">landscape</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">Land Characteristics</h3>
<p class="text-on-surface-variant text-sm font-label">Soil quality, elevation, and terrain</p>
</div>
</div>
<span class="material-symbols-outlined text-outline transition-transform group-hover:translate-x-1">chevron_right</span>
</button>
</div>
<!-- Media & Photos -->
<div class="bg-surface-container-lowest rounded-full overflow-hidden shadow-[0px_20px_40px_rgba(0,31,41,0.06)] group">
<button class="w-full flex items-center justify-between p-6 text-left hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined">photo_library</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">Media &amp; Photos</h3>
<p class="text-on-surface-variant text-sm font-label">12 items uploaded</p>
</div>
</div>
<span class="material-symbols-outlined text-outline transition-transform group-hover:translate-x-1">chevron_right</span>
</button>
</div>
<!-- Pricing & Availability -->
<div class="bg-surface-container-lowest rounded-full overflow-hidden shadow-[0px_20px_40px_rgba(0,31,41,0.06)] group border-2 border-primary/5">
<button class="w-full flex items-center justify-between p-6 text-left hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-primary-fixed flex items-center justify-center text-on-primary-fixed">
<span class="material-symbols-outlined">payments</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">Pricing &amp; Availability</h3>
<p class="text-on-surface-variant text-sm font-label">Listing price and terms</p>
</div>
</div>
<span class="material-symbols-outlined text-outline transition-transform group-hover:translate-x-1">chevron_right</span>
</button>
</div>
<!-- Legal & Documents -->
<div class="bg-surface-container-lowest rounded-full overflow-hidden shadow-[0px_20px_40px_rgba(0,31,41,0.06)] group">
<button class="w-full flex items-center justify-between p-6 text-left hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined">description</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">Legal &amp; Documents</h3>
<p class="text-on-surface-variant text-sm font-label">Titles, permits, and surveys</p>
</div>
</div>
<span class="material-symbols-outlined text-outline transition-transform group-hover:translate-x-1">chevron_right</span>
</button>
</div>
</div>
<!-- Meta Info -->
<div class="mt-12 p-8 bg-surface-container-low rounded-full border border-outline-variant/10">
<h4 class="font-headline font-bold text-on-surface mb-2">Publishing Status</h4>
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<p class="text-sm font-label text-on-surface-variant leading-relaxed">Your changes are automatically saved as a draft. Publishing will make this visible to verified buyers in the marketplace.</p>
</div>
</div>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 p-6 z-50 pointer-events-none">
<div class="max-w-3xl mx-auto flex justify-center">
<button class="pointer-events-auto w-full md:w-auto md:min-w-[320px] bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 px-8 rounded-full shadow-2xl flex items-center justify-center gap-3 hover:opacity-90 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined">check_circle</span>
                Save Changes
            </button>
</div>
</div>
<!-- BottomNavBar (Hidden for focused task as per suppression rule, but included for structure if needed in future) -->
<!-- Suppression logic applied: suppress navigation on task-focused sub-pages -->
</body></html>
