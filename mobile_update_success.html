<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#f3faff]/70 dark:bg-[#001f29]/70 backdrop-blur-xl fixed top-0 w-full z-50">
<div class="flex items-center px-6 h-16 w-full max-w-xl mx-auto">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#1B4332] dark:text-[#a1f4c8]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-4 font-manrope font-bold tracking-tight text-lg text-[#1B4332] dark:text-[#a1f4c8]">Security Settings</h1>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow w-full max-w-md px-6 pt-24 pb-12 flex flex-col items-center justify-center text-center">
<!-- Success State Visualization -->
<div class="relative w-full mb-12">
<!-- Background Layered Landscape Effect -->
<div class="absolute inset-0 bg-surface-container-low rounded-[3rem] -rotate-3 scale-105 opacity-50"></div>
<div class="absolute inset-0 bg-surface-container-high rounded-[3rem] rotate-2 scale-100 opacity-30"></div>
<div class="relative bg-surface-container-lowest rounded-[3rem] p-12 flex flex-col items-center shadow-[0px_20px_40px_rgba(0,31,41,0.06)] border-outline/10">
<!-- Large Checkmark Icon -->
<div class="w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-on-secondary-container text-5xl" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline font-extrabold text-3xl text-primary tracking-tight mb-4">Mobile Number Updated</h2>
<p class="font-body text-on-surface-variant leading-relaxed text-sm max-w-xs mx-auto">
                    Your new number is now verified and set as your primary contact.
                </p>
</div>
</div>
<!-- Detail Information Card -->
<div class="w-full bg-surface-container-low rounded-xl p-6 mb-10 flex items-start text-left gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="security">security</span>
<div>
<h3 class="font-headline font-bold text-sm text-primary mb-1">Security Confirmation</h3>
<p class="font-label text-xs text-on-surface-variant">Two-factor authentication will now use this updated number for all future login attempts.</p>
</div>
</div>
<!-- Action Button -->
<div class="w-full space-y-4">
<a class="inline-flex items-center justify-center w-full h-14 bg-horizon-gradient text-on-primary font-headline font-bold rounded-xl active:scale-95 transition-all duration-200 shadow-lg" href="#">
                Back to Settings
            </a>
<p class="font-label text-[10px] text-on-surface-variant/60 uppercase tracking-widest">Confirmation ID: 882-991-LX</p>
</div>
</main>
<!-- Bottom Navigation Shell Suppressed as per Task-Focused/Transactional Suppression Rule -->
