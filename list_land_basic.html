<body class="bg-background text-on-surface font-body min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f3faff]/70 dark:bg-[#001f29]/70 backdrop-blur-xl">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity duration-300 text-[#1B4332] dark:text-[#a1f4c8]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-manrope tracking-tight font-bold text-2xl uppercase text-[#1B4332] dark:text-[#a1f4c8]">List Land</h1>
</div>
<div class="h-10 w-10 rounded-full overflow-hidden bg-surface-container-high ring-2 ring-primary-fixed">

<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">Tap to add vertices</span>

<circle cx="120" cy="80" fill="#002d1c" r="6" stroke="#ffffff" stroke-width="2"></circle>

<circle cx="320" cy="220" fill="#002d1c" r="6" stroke="#ffffff" stroke-width="2"></circle>
<circle cx="150" cy="250" fill="#002d1c" r="6" stroke="#ffffff" stroke-width="2"></circle>
</svg>
<!-- Map Controls Overlay -->
<div class="absolute bottom-4 right-4 flex flex-col gap-2">
<button class="w-10 h-10 rounded-md bg-surface-container-lowest/80 backdrop-blur-md shadow-sm flex items-center justify-center text-primary hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined">my_location</span>
</button>
<button class="w-10 h-10 rounded-md bg-surface-container-lowest/80 backdrop-blur-md shadow-sm flex items-center justify-center text-primary hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</div>
</section>

<section class="grid grid-cols-1 gap-6">
<!-- Price Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-sm font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="price">Asking Price</label>
<div class="relative">
<span class="absolute left-6 top-1/2 -translate-y-1/2 text-primary font-bold text-lg">$</span>

</div>
</div>
<!-- Description Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-sm font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="description">Description</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-6 focus:ring-2 focus:ring-primary-container text-on-surface font-body resize-none placeholder:text-on-surface-variant/40 leading-relaxed" id="description" placeholder="Tell us about the soil, the water rights, and the horizon..." rows="5"></textarea>
</div>
</section>
<!-- Action Button -->
<section class="mt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-extrabold py-5 rounded-full shadow-lg hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-3 text-lg uppercase tracking-wider">
<span class="material-symbols-outlined" data-weight="fill">landscape</span>
                    List My Plot
                </button>
<p class="text-center text-on-surface-variant text-xs mt-6 font-label leading-relaxed px-12">
                    By listing your plot, you agree to our <span class="underline cursor-pointer">Terms of Service</span> and acknowledge that technical data will be verified by a local surveyor.
                </p>
</section>

</a>

<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-widest">Profile</span>
</a>
</nav>
