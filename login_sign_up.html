<style>

<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Hero Background Wrapper -->
<div class="relative min-h-screen w-full flex items-center justify-center overflow-hidden bg-surface-dim">
<!-- Large Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Vast green plains" class="w-full h-full object-cover" data-alt="Cinematic aerial view of vast rolling emerald green hills and misty valleys at sunrise with soft atmospheric depth" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0sBa53DJu5M73hMj3IEZFsxxeDryT34nM5_uJvjtq3N3kglbYMOCVw7-NDmgtZh50Mw2tA7GoPM-xiuoOMLIrdXdCvN0Roz2yNbkEXkHAU4RZU3jAwLsyLEP0COUvzPnOnUeXYBq6PgMhjwEMsBoAcFhZzIROAq1iAWpkWg3qVdt3kPU3x4YlmmKoMpDFshbr9mI2emJsGjHwtlc9IZVfnUfXsze0ooFBw2MsnLzr5j2xI3jt3voWPFwW4n0i6X2CuJy7eso0bD1h"/>
<!-- Tonal Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
</div>
<!-- Main Content Shell -->
<main class="relative z-10 w-full max-w-[480px] px-6">
<div class="glass-panel atmospheric-perspective rounded-[2rem] p-8 md:p-12 flex flex-col items-center">
<!-- Brand Anchor -->
<div class="mb-12">
<span class="font-headline tracking-[0.2em] text-xl font-light text-primary uppercase">TERRA NOVA</span>
</div>
<!-- Messaging -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-extrabold text-primary tracking-tight mb-3">Welcome Back</h1>
<p class="font-label text-sm text-on-surface-variant font-medium opacity-80 uppercase tracking-widest">Identify your parcel</p>
</div>
<!-- Social Authentication Cluster -->
<div class="w-full space-y-3 mb-8">
<!-- Google CTA -->
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-surface-container-lowest text-on-surface rounded-xl border border-outline-variant/15 hover:bg-surface-container-low transition-colors duration-300 atmospheric-perspective">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google logo with vibrant colors on white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPQGp9jXcArDDUO3MpCzQ_GXaenOa9vqE47R7HPIpJOWj_sEIMc_hay9Y6ltZw578LSwJ1JOv_NAVbkESlcwMY4aEJpLTJFUWoykN5c66Qs3XHPX6d2nnbBM_vLCcowf7a5J-XcM2QKYNGK1THaU3956qmtGJIC1zZk8bX7nIVVPaaqFi9Dtju4xSGdQgdPwVEV4l8rlFORVBbkcBgkn-JqXuhvv3Z2i8otVUwLmjzyMEGtxw1hBGzCJyd68I35H-Wmz1QSz6ekKg9"/>
<span class="font-label text-sm font-semibold tracking-wide">Continue with Google</span>
</button>
<!-- Apple CTA -->
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-primary text-on-primary rounded-xl hover:opacity-90 transition-opacity duration-300 atmospheric-perspective">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label text-sm font-semibold tracking-wide">Continue with Apple</span>
</button>
</div>
<!-- Visual Separator -->
<div class="w-full flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Primary Email Form -->
<div class="w-full space-y-6">
<div class="relative group">
<input class="w-full bg-surface-container-lowest/50 border-0 border-b border-outline-variant py-4 px-0 font-label text-on-surface focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-on-surface-variant/40" placeholder="Email or Phone" type="text"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-500"></div>
</div>
<button class="w-full horizon-gradient py-4 rounded-xl text-on-primary font-headline font-bold text-lg atmospheric-perspective hover:scale-[1.01] active:scale-[0.98] transition-all duration-300">
                        Continue
                    </button>
</div>
<!-- Footer Disclaimer -->
<div class="mt-12 text-center max-w-[280px]">
<p class="font-label text-[11px] leading-relaxed text-on-surface-variant/60">
                        By continuing, you agree to our <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>.
                    </p>
</div>
</div>
<!-- Contextual Navigation (Back) -->
<div class="mt-8 flex justify-center">
<a class="flex items-center gap-2 group" href="#">
<span class="material-symbols-outlined text-primary text-xl group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-label text-sm font-bold text-primary">Return to Explorer</span>
</a>
</div>
</main>
<!-- Aesthetic Topographic Element (Bottom Right) -->
<div class="absolute bottom-10 right-10 z-0 opacity-20 pointer-events-none hidden lg:block">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<path d="M10 100Q100 10 200 100T390 100" stroke="#002d1c" stroke-width="0.5"></path>
<path d="M10 120Q100 30 200 120T390 120" stroke="#002d1c" stroke-width="0.5"></path>
<path d="M10 140Q100 50 200 140T390 140" stroke="#002d1c" stroke-width="0.5"></path>
<path d="M10 160Q100 70 200 160T390 160" stroke="#002d1c" stroke-width="0.5"></path>
<path d="M10 180Q100 90 200 180T390 180" stroke="#002d1c" stroke-width="0.5"></path>
